spring:
  application:
    name: lovable-clone

  datasource:
    url: jdbc:postgresql://localhost:9000/testDB
    username: testUser
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  ai:
    openai:
      api-key:
      base-url: https://openroute.ai/api
      chat:
        options:
          model: qwen/qwen3-vl-235b-a22b-thinking
          temperature: 0.0
          max-tokens: 1500

jwt:
  secret-key:

stripe:
  api:
    secret-key:
  webhook:
    secret-key:

client.url: http://localhost:8080